# deputy 节点配置 (sync_config.toml)
# 详细文档见 docs/nodes-toml-guide.md

[subscription]
format = "clash"
exclude_keywords = ["官网", "到期", "剩余流量", "距离下次重置剩余"]

# Transport chain retry/backoff tuning (mirrors mihomo-config).
# Defaults are conservative; tune down max_total_attempts for faster sync.
[subscription.fetch]
base_delay = 0.5
max_delay = 8.0
jitter_range = 0.3
max_attempts_per_transport = 4
max_total_attempts = 20
timeout = 45

[probe]
timeout = 3
concurrency = 30
retries = 0
address_family = "auto"

# 静态节点（可选）。所有支持的标准 Clash 代理类型都可使用。
# [[static_nodes]] 段为列表，每段一个节点。

# [[static_nodes]]
# name = "手动-hk-1"
# type = "vmess"
# server = "hk1.example.com"
# port = 443
# uuid = "your-uuid"
# alterId = 0
# cipher = "auto"

[subscription_sources]
# 订阅源名称 = 订阅 URL
# 节点会自动添加订阅源名称作为前缀，避免冲突

# https://github.com/anaer/Sub
# "anaer" = "https://raw.githubusercontent.com/anaer/Sub/main/clash.yaml"

# https://github.com/ermaozi/get_subscribe
"ermaozi" = "https://www.ermao.net/sub/clash/ermao.net"

# https://github.com/vxiaov/free_proxies
"vxiaov" = "https://raw.githubusercontent.com/vxiaov/free_proxies/main/clash/clash.provider.yaml"

# 个人订阅
"一元" = "https://dp3.config-sync.com/api/v1/client/subscribe?token=7b34d51b1b6de86017e88b209b83730a"

# [rename] 节点重命名配置（可选）
# 全局默认设置 + 逐源覆盖，未配置时使用默认值（sanitize=true, separator="-"）
#
# [rename]
# sanitize = true      # 是否清洗节点名（去 emoji/标点/折叠空白）
# separator = "-"      # 前缀与节点名之间的分隔符
# max_length = 0       # 节点名最大长度（0 表示不限制）
#
# [rename."anaer"]     # 逐源覆盖：为该源指定自定义前缀
# prefix = "AN"
#
# [rename."vxiaov"]
# prefix = "VX"