# mihomo (Clash Meta) 懒人配置 - 本地节点版
#
# ⚠️ 警告：此文件由 scripts/sync_nodes.py 自动生成
# - 每 3 小时通过 GitHub Actions 自动同步
# - 手动修改会被覆盖，如需调整请修改 proxies.yaml 或 scripts/sync_config.toml
# - 中转模式用于切换是否走中转；中转节点只包含订阅节点，按名称字母顺序排序
#   （订阅节点名称会自动添加前缀：hk-xxx, us-xxx 等）
#
# 规则订阅
rule-providers:
  AWAvenue-Ads:
    type: http
    behavior: domain
    format: yaml
    path: ./rule_provider/AWAvenue-Ads.yaml
    url: "https://ghfast.top/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml"
    interval: 600

  StevenBlack:
    type: http
    behavior: domain
    format: text
    path: ./rule_provider/StevenBlack.yaml
    url: "https://fastly.jsdelivr.net/gh/Ckrvxr/MihomoYAML@release/StevenBlack.yaml"
    interval: 600

  Adguard-Adblock:
    type: http
    behavior: domain
    format: text
    path: ./rule_provider/Adguard-Adblock.yaml
    url: "https://fastly.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomo.yaml"
    interval: 600

# 分组
pr:
  &pr {
    type: select,
    proxies: [节点选择, hk-1, hk-2, us-bandwagon, DIRECT],
  }

# 延迟检测 URL
p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://cp.cloudflare.com
    interval: 300
    timeout: 1000
    tolerance: 100

# proxies 段由 scripts/sync_nodes.py 自动维护，手动节点见 proxies.yaml
proxies:
{LOCAL_PROXIES}
{SUB_PROXIES}

proxy-groups:
  - { name: 节点选择, type: select, proxies: [{NODE_SELECT_LIST}] }
  - { name: 中转模式, type: select, proxies: [中转节点, DIRECT] }
  - { name: 中转节点, type: url-test, proxies: [{DIALER_LIST}], url: https://cp.cloudflare.com, interval: 300 }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT, 节点选择] }
  - { name: 境外AI, type: select, proxies: [us-bandwagon, 节点选择] }
  - { name: Apple, <<: *pr }
  - { name: Google, type: select, proxies: [us-bandwagon, 节点选择, DIRECT] }
  - { name: Telegram, <<: *pr }
  - { name: Twitter, type: select, proxies: [us-bandwagon, hk-1, hk-2, 节点选择] }
  - { name: Pixiv, <<: *pr }
  - { name: EHentai, type: select, proxies: [hk-1, hk-2, us-bandwagon, 节点选择] }
  - { name: 巴哈姆特, type: select, proxies: [hk-1, hk-2] }
  - { name: 任天堂, type: select, proxies: [hk-1, hk-2, 节点选择, DIRECT] }
  - { name: YouTube, <<: *pr }
  - { name: NETFLIX, <<: *pr }
  - { name: TikTok, <<: *pr }
  - { name: Spotify, <<: *pr }
  - { name: Github, <<: *pr }
  - { name: Steam, <<: *pr }
  - { name: OneDrive, <<: *pr }
  - { name: 微软服务, <<: *pr }
  - { name: 国内, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 其他, <<: *pr }

rules:
  - RULE-SET,AWAvenue-Ads,广告拦截
  - RULE-SET,StevenBlack,广告拦截
  - RULE-SET,Adguard-Adblock,广告拦截
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,apple,Apple
  - GEOSITE,apple-cn,Apple
  - GEOSITE,ehentai,EHentai
  - GEOSITE,github,Github
  - GEOSITE,twitter,Twitter
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,google-cn,Google
  - GEOSITE,telegram,Telegram
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,tiktok,TikTok
  - GEOSITE,bahamut,巴哈姆特
  - GEOSITE,nintendo,任天堂
  - GEOSITE,spotify,Spotify
  - GEOSITE,pixiv,Pixiv
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,steam,Steam
  - GEOSITE,onedrive,OneDrive
  - GEOSITE,microsoft,微软服务
  - GEOSITE,geolocation-!cn,其他
  - GEOIP,google,Google
  - GEOIP,netflix,NETFLIX
  - GEOIP,telegram,Telegram
  - GEOIP,twitter,Twitter
  - GEOSITE,CN,国内
  - GEOIP,CN,国内
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - MATCH,其他
