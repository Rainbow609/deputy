name: Sync Nodes and Release

on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-and-release.yml"
      - "src/deputy/**"
      - "scripts/sync_nodes.py"
      - "config.template.yaml"
      - "sync_config.toml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write

concurrency:
  group: sync-nodes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Restore subscription caches
        uses: actions/cache/restore@v5
        id: cache-restore
        with:
          path: subscriptions/
          key: subscriptions-${{ runner.os }}-${{ hashFiles('sync_config.toml') }}
          restore-keys: |
            subscriptions-${{ runner.os }}-

      - name: Run bootstrap sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/sync_nodes.py --config sync_config.toml --template config.template.yaml --output config.yaml --previous config.previous.yaml

      - name: Download Mihomo
        run: |
          set -euo pipefail
          url="$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | test("linux-amd64.*\\.gz$")) | .browser_download_url' | head -n1)"
          test -n "$url"
          curl -fsSL "$url" -o /tmp/mihomo.gz
          gunzip -c /tmp/mihomo.gz > /tmp/mihomo
          chmod +x /tmp/mihomo
          /tmp/mihomo -v

      - name: Start Mihomo controller
        run: |
          set -euo pipefail
          {
            printf 'external-controller: 127.0.0.1:9093\n'
            printf 'secret: deputy-ci\n'
            cat config.yaml
          } > config.mihomo.yaml
          nohup /tmp/mihomo -f config.mihomo.yaml > mihomo.log 2>&1 &
          for _ in $(seq 1 20); do
            if curl -fsS -H 'Authorization: Bearer deputy-ci' http://127.0.0.1:9093/version >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat mihomo.log
          exit 1

      - name: Prepare verification-enabled config
        run: |
          set -euo pipefail
          cp sync_config.toml sync_config.health.toml
          perl -0pi -e 's/(\[probe\.cn\]\s*enabled\s*=\s*)false/${1}true/s; s/(provider\s*=\s*)"noop"/${1}"auto"/s; s/(\[probe\.health\]\s*enabled\s*=\s*)false/${1}true/s; s/(secret\s*=\s*)""/${1}"deputy-ci"/s' sync_config.health.toml

      - name: Run sync with CN probe and Mihomo health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/sync_nodes.py --config sync_config.health.toml --template config.template.yaml --output config.yaml --previous config.previous.yaml

      - name: Save subscription caches
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: subscriptions/
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Save previous config
        if: always()
        run: |
          if [ -f config.yaml ]; then
            cp config.yaml config.previous.yaml || true
          fi

      - name: Create GitHub Release
        if: hashFiles('config.yaml') != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: deputy-latest
          name: Latest Deputy Config
          body: |
            Latest mihomo-config-style Clash Meta configuration.
            See `config.yaml` asset for the rendered configuration.
            See workflow logs for node statistics and any failed sources.
          files: config.yaml
          fail_on_unmatched_files: false
