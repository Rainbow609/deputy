name: Sync Nodes and Release

on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/deputy/**"
      - "scripts/sync_nodes.py"
      - "config.template.yaml"
      - "sync_config.toml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write

concurrency:
  group: sync-nodes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Restore subscription caches
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: subscriptions/
          key: subscriptions-${{ runner.os }}-${{ hashFiles('sync_config.toml') }}
          restore-keys: |
            subscriptions-${{ runner.os }}-

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/sync_nodes.py --config sync_config.toml --template config.template.yaml --output config.yaml --previous config.previous.yaml

      - name: Save subscription caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: subscriptions/
          key: subscriptions-${{ runner.os }}-${{ hashFiles('sync_config.toml') }}

      - name: Save previous config
        if: always()
        run: |
          if [ -f config.yaml ]; then
            cp config.yaml config.previous.yaml || true
          fi

      - name: Create GitHub Release
        if: hashFiles('config.yaml') != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: deputy-latest
          name: Latest Deputy Config
          body: |
            Latest mihomo-config-style Clash Meta configuration.
            See `config.yaml` asset for the rendered configuration.
            See workflow logs for node statistics and any failed sources.
          files: config.yaml
          fail_on_unmatched_files: false
